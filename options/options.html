<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scene Switch — Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="options" role="main">
      <header class="options__header">
        <img
          class="options__logo"
          src="../assets/icons/icon48.png"
          alt=""
          width="32"
          height="32"
        />
        <h1 class="options__title">Scene Switch</h1>
      </header>
      <section class="options__section">
        <h2>About</h2>
        <p>
          Scene Switch transforms the current page into playful themed scenes.
          It runs only when you click it on a page.
        </p>
      </section>
      <section class="options__section">
        <h2>Settings</h2>
        <p class="options__muted">
          Settings controls arrive in a later slice.
        </p>
      </section>
    </main>
    <script type="module" src="options.js"></script>
  </body>
</html>
