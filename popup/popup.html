<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scene Switch</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup" role="main">
      <header class="popup__header">
        <img
          class="popup__logo"
          src="../assets/icons/icon32.png"
          alt=""
          width="24"
          height="24"
        />
        <h1 class="popup__title" data-popup-title>Scene Switch</h1>
        <button
          type="button"
          class="popup__icon-button"
          data-open-settings
          aria-label="Open Scene Switch settings"
          title="Settings"
        >
          <svg
            class="popup__icon"
            viewBox="0 0 16 16"
            aria-hidden="true"
            focusable="false"
          >
            <path
              fill="currentColor"
              d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5Zm0 1.2a1.3 1.3 0 1 1 0 2.6 1.3 1.3 0 0 1 0-2.6Zm5.6 1.3-1-.2-.2-.6.6-.9-.8-.9-.9.5-.6-.2-.3-1h-1.2l-.3 1-.6.2-.9-.5-.8.9.6.9-.2.6-1 .2v1.2l1 .2.2.6-.6.9.8.9.9-.5.6.2.3 1h1.2l.3-1 .6-.2.9.5.8-.9-.6-.9.2-.6 1-.2V8Z"
            />
          </svg>
        </button>
      </header>
      <p class="popup__subheading" data-popup-subheading>
        Turn this tab into something else.
      </p>

      <section
        class="popup__body"
        data-popup-body
        aria-live="polite"
        aria-busy="false"
      ></section>

      <p class="popup__trust" data-popup-trust>
        Runs only on this page when you click. No history tracking.
      </p>

      <footer class="popup__footer">
        <button
          type="button"
          class="popup__link"
          data-open-support
          data-popup-support-footer
        >
          Made you laugh? Buy me a coffee.
        </button>
      </footer>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
