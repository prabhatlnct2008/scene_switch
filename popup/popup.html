<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Scene Switch</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup" role="main">
      <header class="popup__header">
        <img
          class="popup__logo"
          src="../assets/icons/icon32.png"
          alt=""
          width="24"
          height="24"
        />
        <h1 class="popup__title" data-popup-title>Scene Switch</h1>
      </header>
      <p class="popup__subheading" data-popup-subheading>
        Turn this tab into something else.
      </p>

      <section class="popup__status" data-popup-status aria-live="polite">
        <p class="popup__status-line" data-popup-status-line>
          Checking this page&hellip;
        </p>
      </section>

      <p class="popup__trust" data-popup-trust>
        Runs only on this page when you click. No history tracking.
      </p>
    </main>
    <script type="module" src="popup.js"></script>
  </body>
</html>
